version: "3.9"
services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ai_bot_db
      POSTGRES_USER: ai_bot_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./logs:/app/logs
    ports:
      - "5432:5432"
    restart: always
    networks: [appnet]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_bot_user -d ai_bot_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://ai_bot_user:${DB_PASSWORD:-secure_password_123}@db:5432/ai_bot_db
    volumes:
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: always
    networks: [appnet]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Убираем worker service, так как scheduler запускается в основном приложении
  # worker:
  #   build: .
  #   env_file: .env
  #   command: ["python","-m","app.worker"]
  #   restart: always
  #   networks: [appnet]

  nginx:
    image: nginx:stable
    volumes:
      - ./ops/nginx-simple.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs:/var/log/nginx
    ports: 
      - "80:80"
    depends_on:
      - web
    restart: always
    networks: [appnet]

  # Опциональный сервис для мониторинга логов
  log-viewer:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9999:8080"
    restart: unless-stopped
    networks: [appnet]
    profiles: ["monitoring"]

volumes:
  postgres_data:
  ssl_certs:

networks:
  appnet:
    driver: bridge
